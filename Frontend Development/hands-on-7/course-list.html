<p *ngIf="loading">Loading...</p>

<h2>Course List</h2>

<input
  type="text"
  placeholder="Search course"
  [(ngModel)]="searchTerm">

<hr>

<div *ngFor="let course of filteredCourses">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits }}</p>
  <p>Grade: {{ course.grade }}</p>
  <hr>
</div>

<p *ngIf="!loading && filteredCourses.length === 0">
  No courses found
</p>
